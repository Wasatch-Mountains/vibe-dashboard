<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Analytics | Project Heartbeat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent: #22d3ee;
            --border: #1e293b;
            --signal-red: #ef4444;
            --signal-yellow: #eab308;
            --signal-green: #22c55e;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; color: var(--accent); }

        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1.25rem;
        }

        /* Retro panel signal — traffic stack */
        #system-signal {
            font-family: 'Share Tech Mono', ui-monospace, monospace;
            display: flex;
            align-items: stretch;
            gap: 0;
            border: 2px solid #3f3f2a;
            border-radius: 4px;
            background: linear-gradient(145deg, #1a1814 0%, #0d0c0a 50%, #141210 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 4px 0 #0a0908,
                0 6px 16px rgba(0, 0, 0, 0.45);
            overflow: hidden;
            min-width: 280px;
            max-width: 420px;
        }

        .signal-lamps {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            padding: 0.65rem 0.75rem;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.12) 2px,
                rgba(0, 0, 0, 0.12) 3px
            );
            border-right: 2px solid #2a281f;
        }

        .lamp {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #1c1912;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
            opacity: 0.35;
            filter: saturate(0.4) brightness(0.55);
        }

        .lamp.red { background: radial-gradient(circle at 35% 30%, #fca5a5, var(--signal-red) 45%, #7f1d1d); }
        .lamp.yellow { background: radial-gradient(circle at 35% 30%, #fef08a, var(--signal-yellow) 45%, #713f12); }
        .lamp.green { background: radial-gradient(circle at 35% 30%, #86efac, var(--signal-green) 45%, #14532d); }

        /* Top lamp = proxy reachability only */
        #system-signal[data-proxy="pending"] .lamp.red {
            opacity: 0.88;
            filter: saturate(0.9) brightness(0.95);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                0 0 8px var(--signal-red),
                0 0 16px rgba(239, 68, 68, 0.35);
            animation: lamp-pulse-red 1s ease-in-out infinite;
        }

        #system-signal[data-proxy="down"] .lamp.red {
            opacity: 1;
            filter: saturate(1) brightness(1);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.35),
                0 0 12px var(--signal-red),
                0 0 24px rgba(239, 68, 68, 0.5);
            animation: none;
        }

        #system-signal[data-proxy="up"] .lamp.red {
            opacity: 0.32;
            filter: saturate(0.35) brightness(0.5);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.55);
            animation: none;
        }

        /* Middle = payload / pipeline in flight (only after proxy answers) */
        #system-signal[data-proxy="up"][data-phase="loading"] .lamp.yellow {
            opacity: 1;
            filter: saturate(1) brightness(1);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.4),
                0 0 12px var(--signal-yellow),
                0 0 22px rgba(234, 179, 8, 0.5);
            animation: lamp-pulse 1.1s ease-in-out infinite;
        }

        #system-signal[data-proxy="up"][data-phase="success"] .lamp.green {
            opacity: 1;
            filter: saturate(1) brightness(1);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.35),
                0 0 12px var(--signal-green),
                0 0 22px rgba(34, 197, 94, 0.4);
        }

        @keyframes lamp-pulse {
            0%, 100% { opacity: 1; filter: saturate(1) brightness(1); }
            50% { opacity: 0.82; filter: saturate(0.9) brightness(0.92); }
        }

        @keyframes lamp-pulse-red {
            0%, 100% { opacity: 0.88; filter: saturate(0.9) brightness(0.95); }
            50% { opacity: 0.62; filter: saturate(0.75) brightness(0.8); }
        }

        .signal-readout {
            flex: 1;
            padding: 0.65rem 0.85rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 5.5rem;
            background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(34, 211, 238, 0.04), transparent 55%);
        }

        .signal-label {
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #78716c;
            margin-bottom: 0.35rem;
        }

        #signal-message {
            margin: 0;
            font-size: 0.82rem;
            line-height: 1.45;
            color: #d6d3d1;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.08);
        }

        #system-signal[data-proxy="pending"] #signal-message { color: #fca5a5; text-shadow: 0 0 8px rgba(239, 68, 68, 0.12); }
        #system-signal[data-proxy="down"] #signal-message { color: #fecaca; text-shadow: 0 0 10px rgba(239, 68, 68, 0.25); }
        #system-signal[data-phase="loading"] #signal-message { color: #fef08a; text-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }
        #system-signal[data-phase="success"] #signal-message { color: #bbf7d0; text-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        #system-signal[data-phase="fault"][data-proxy="up"] #signal-message { color: #fdba74; text-shadow: 0 0 10px rgba(251, 146, 60, 0.2); }

        /* THE GRID: Handles the layout of our widgets */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0.5rem 0;
        }

        #vibe-table {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div class="header-row">
                <div>
                    <h1>🛸 VIBE INSIGHTS <small style="font-size: 0.5em; vertical-align: middle; opacity: 0.6;">FRA1 ENGINE</small></h1>
                    <p style="opacity: 0.55; font-size: 0.85rem; margin: 0.5rem 0 0;">Streaming from Render proxy</p>
                </div>
                <div id="system-signal" data-proxy="pending" data-phase="idle" role="status" aria-live="polite">
                    <div class="signal-lamps" aria-hidden="true">
                        <span class="lamp red" title="Proxy reachability"></span>
                        <span class="lamp yellow" title="Payload / feed"></span>
                        <span class="lamp green" title="Dashboard ready"></span>
                    </div>
                    <div class="signal-readout">
                        <span class="signal-label">System line</span>
                        <p id="signal-message">Contacting proxy — reachability check…</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>Total Vibes Received</h3>
                <div id="vibe-count" class="metric-value">...</div>
                <p style="opacity: 0.6; font-size: 0.8rem;">Cumulative project responses</p>
            </div>

            <div class="card">
                <h3>Vibe Trend (NPS)</h3>
                <div id="nps-chart">
                    <p style="text-align: center; padding-top: 50px; opacity: 0.5;">Calculating vibes...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Raw Chaos Feed (Drill-Down)</h3>
            <div id="vibe-table">
                </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
