<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Analytics | Project Heartbeat</title>
    
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent: #22d3ee;
            --border: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; color: var(--accent); }

        /* THE GRID: Handles the layout of our widgets */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0.5rem 0;
        }

        #vibe-table {
            background: transparent;
            border: none;
        }

        /* Status Indicator */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #4ade80;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>🛸 VIBE INSIGHTS <small style="font-size: 0.5em; vertical-align: middle; opacity: 0.6;">FRA1 ENGINE</small></h1>
            <p><span class="status-dot"></span> Streaming live from Render Proxy</p>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>Total Vibes Received</h3>
                <div id="vibe-count" class="metric-value">...</div>
                <p style="opacity: 0.6; font-size: 0.8rem;">Cumulative project responses</p>
            </div>

            <div class="card">
                <h3>Vibe Trend (NPS)</h3>
                <div id="nps-chart">
                    <p style="text-align: center; padding-top: 50px; opacity: 0.5;">Calculating vibes...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Raw Chaos Feed (Drill-Down)</h3>
            <div id="vibe-table">
                </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
